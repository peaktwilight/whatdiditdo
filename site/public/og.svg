<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Title: whatdiditdo -->
  <text x="600" y="155" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="72" font-weight="bold">
    <tspan fill="#06b6d4">what</tspan><tspan fill="#e5e5e5">did</tspan><tspan fill="#a3a3a3">it</tspan><tspan fill="#e5e5e5">do</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="205" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#737373">
    You let the AI cook. Now find out what it actually did.
  </text>

  <!-- Terminal box -->
  <rect x="280" y="250" width="640" height="240" rx="12" fill="#171717" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="280" y="250" width="640" height="36" rx="12" fill="#1e1e1e"/>
  <rect x="280" y="274" width="640" height="12" fill="#1e1e1e"/>
  <line x1="280" y1="286" x2="920" y2="286" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Dots -->
  <circle cx="304" cy="268" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="324" cy="268" r="6" fill="#eab308" opacity="0.8"/>
  <circle cx="344" cy="268" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="375" y="273" font-family="'Courier New', Courier, monospace" font-size="12" fill="#525252">whatdiditdo</text>

  <!-- Terminal content -->
  <!-- FILES CHANGED header -->
  <text x="310" y="320" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="bold" fill="#06b6d4">FILES CHANGED</text>

  <!-- New file -->
  <text x="320" y="348" font-family="'Courier New', Courier, monospace" font-size="15">
    <tspan fill="#4ade80">&#x271A;</tspan>
    <tspan fill="#e5e5e5"> src/auth.ts</tspan>
    <tspan fill="#525252"> (new)</tspan>
  </text>

  <!-- Modified file -->
  <text x="320" y="376" font-family="'Courier New', Courier, monospace" font-size="15">
    <tspan fill="#facc15">&#x270E;</tspan>
    <tspan fill="#e5e5e5"> src/app.ts</tspan>
    <tspan fill="#4ade80"> +12</tspan>
    <tspan fill="#f87171"> -3</tspan>
  </text>

  <!-- Deleted file -->
  <text x="320" y="404" font-family="'Courier New', Courier, monospace" font-size="15">
    <tspan fill="#f87171">&#x2716;</tspan>
    <tspan fill="#e5e5e5"> src/old-auth.ts</tspan>
    <tspan fill="#525252"> (deleted)</tspan>
  </text>

  <!-- Security flag -->
  <text x="310" y="450" font-family="'Courier New', Courier, monospace" font-size="15">
    <tspan fill="#f59e0b">&#x26A0; 1 security flag</tspan>
  </text>

  <!-- Bottom URL -->
  <text x="600" y="570" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#525252">whatdiditdo.doruk.ch</text>
</svg>
